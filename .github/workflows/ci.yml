name: ci

# Public quality benchmark for LibreNexus.
#
# Every job maps to one or more `make` targets so that a contributor running
# `make verify` locally exercises exactly the same gates as CI. See
# specs/quality-gates.md for the rule IDs and thresholds enforced here.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22'

jobs:
  # ---------------------------------------------------------------------------
  # Static quality gates: no database or browser required.
  # ---------------------------------------------------------------------------
  static:
    name: static (format, complexity, types, duplication, deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Format check (QG-FORMAT)
        run: make format-check

      - name: Complexity / dead code (QG-COMPLEXITY, QG-DEADCODE)
        run: make complexity

      - name: Static analysis (QG-STATIC)
        run: make static

      - name: Duplication (QG-DUPLICATION)
        run: make duplication

      - name: Unused dependencies (QG-DEPS-UNUSED)
        run: make unused

      - name: Implicit dependencies (QG-DEPS-IMPLICIT)
        run: make require-check

  # ---------------------------------------------------------------------------
  # Tests, coverage and mutation: require PostgreSQL.
  # ---------------------------------------------------------------------------
  tests:
    name: tests, coverage, mutation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: librenexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: librenexus_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: pcov
          extensions: pdo_pgsql, pgsql

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          npm run build

      - name: Tests (QG-TESTS)
        run: make test

      - name: Coverage (QG-COVERAGE)
        run: make coverage COVERAGE_PHP=php

      - name: Mutation (QG-MUTATION)
        run: make mutation COVERAGE_PHP=php

  # ---------------------------------------------------------------------------
  # End-to-end, accessibility and performance: require a running app + browsers.
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e, accessibility, performance
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: librenexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: librenexus
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          extensions: pdo_pgsql, pgsql

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
          php artisan db:seed --force || true
          npm run build

      - name: Start application
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000 >/dev/null; then echo "app up"; exit 0; fi
            sleep 2
          done
          echo "app did not start" && exit 1

      - name: End-to-end tests (QG-E2E)
        run: make e2e

      - name: Accessibility (QG-A11Y)
        run: make accessibility PUBLIC_URLS="$APP_URL/"

      - name: Performance budgets (QG-PERF)
        run: make performance PUBLIC_URLS="$APP_URL/" CHROME_PATH=""

  # ---------------------------------------------------------------------------
  # Security gates: secrets, SAST, dependency vulnerabilities, SBOM.
  # ---------------------------------------------------------------------------
  security:
    name: security (secrets, sast, audit, osv, sbom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python (semgrep)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install security tools
        run: |
          python -m pip install --quiet semgrep
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b "$HOME/.local/bin" 2>/dev/null \
            || (curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz -C "$HOME/.local/bin" gitleaks)
          curl -sSL https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64 -o "$HOME/.local/bin/osv-scanner"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/"*
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Secret scan (QG-SECRETS)
        run: make secrets

      - name: SAST (QG-SAST)
        run: make sast

      - name: Dependency audit (QG-DEPS-VULN)
        run: make audit

      - name: OSV scan (QG-DEPS-VULN)
        run: make osv

      - name: Generate SBOM
        run: make sbom

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-reports
          path: reports/
          if-no-files-found: ignore
